version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            - node -e "if (!process.env.VITE_API_BASE_URL) { console.error('Missing VITE_API_BASE_URL. Set it in Amplify to your deployed backend URL.'); process.exit(1); }"
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
      redirects:
        - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>
          target: /index.html
          status: 200
