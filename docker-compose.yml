services:
  backend:
    build:
      context: ./backend
    container_name: nova-ai-backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: nova-ai-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
